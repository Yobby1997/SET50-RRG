<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SET50 RRG</title>
<style>
:root{
  --bg:#0f1117;--bg2:#181c25;--bg3:#1e2330;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);
  --text:#e8eaf0;--text2:#8b92a8;--text3:#555d72;
  --green:#1a9e6e;--green-bg:rgba(26,158,110,0.13);
  --red:#d84040;  --red-bg:rgba(216,64,64,0.11);
  --amber:#c47f12;--amber-bg:rgba(196,127,18,0.13);
  --blue:#3278d8; --blue-bg:rgba(50,120,216,0.13);
  --r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;font-size:14px;height:100%;margin:0;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* Header */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--text2)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-err{background:var(--red-bg);color:var(--red)}
.b-warn{background:var(--amber-bg);color:var(--amber)}

/* Controls */
.ctrl-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.cl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.bg{display:flex;border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.bg button{background:transparent;border:none;color:var(--text2);padding:4px 12px;font-size:12px;cursor:pointer;transition:all .15s}
.bg button:hover{background:var(--bg3);color:var(--text)}
.bg button.on{background:var(--blue);color:#fff}
.sep{width:1px;height:18px;background:var(--border)}
.btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:4px 13px;font-size:12px;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s}
.btn:hover:not(:disabled){color:var(--text);border-color:var(--blue)}
.btn:disabled{opacity:.4;cursor:default}
.spin{width:12px;height:12px;border:2px solid var(--text3);border-top-color:var(--blue);border-radius:50%;animation:rot .7s linear infinite;display:none}
@keyframes rot{to{transform:rotate(360deg)}}
.impact-wrap{position:relative}
.impact-pop{position:fixed;top:102px;right:18px;width:min(390px,calc(100vw - 24px));max-height:min(620px,calc(100dvh - 130px));display:none;flex-direction:column;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);box-shadow:0 18px 48px rgba(0,0,0,.55);z-index:300;overflow:hidden}
.impact-pop.open{display:flex}
.impact-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.impact-title{font-size:13px;font-weight:600}
.impact-summary{font-size:11px;color:var(--text2);margin-top:2px}
.impact-close{margin-left:auto;width:28px;height:28px;padding:0;justify-content:center;font-size:18px}
.impact-actions{display:flex;align-items:center;gap:7px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.impact-input{width:62px;height:29px;background:var(--bg);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:0 8px;font:inherit}
.impact-list{overflow:auto;padding:5px 8px 9px}
.impact-list::-webkit-scrollbar{width:4px}
.impact-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.impact-row{display:grid;grid-template-columns:22px 28px 1fr auto;align-items:center;gap:7px;min-height:31px;padding:3px 6px;border-radius:5px;cursor:pointer}
.impact-row:hover{background:var(--bg3)}
.impact-row input{width:14px;height:14px;accent-color:var(--blue)}
.impact-rank{font-size:10px;color:var(--text3);text-align:right}
.impact-ticker{font-size:12px;font-weight:600}
.impact-weight{font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums}
@media(max-width:720px){.impact-pop{top:116px;right:12px;max-height:calc(100dvh - 140px)}}

/* Layout */
.main{display:flex;flex:1;overflow:hidden;min-height:0}

/* Sidebar */
.sb{width:200px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;min-height:0}
.sb-tabs{display:flex;border-bottom:1px solid var(--border)}
.sb-tab{flex:1;padding:7px;font-size:11px;text-align:center;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .15s}
.sb-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.sb-body{flex:1;overflow-y:auto;padding:6px}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.si{display:flex;align-items:center;gap:7px;padding:4px 5px;border-radius:5px;cursor:pointer;margin-bottom:1px;transition:background .1s}
.si:hover{background:var(--bg3)}
.si.sel{background:rgba(50,120,216,.15)}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.stk{font-size:12px;font-weight:500;flex:1}
.sq{font-size:10px;padding:1px 5px;border-radius:3px}
.ql{background:var(--green-bg);color:var(--green)}
.qw{background:var(--amber-bg);color:var(--amber)}
.qg{background:var(--red-bg);color:var(--red)}
.qi{background:var(--blue-bg);color:var(--blue)}
.sci{padding:7px;border-radius:5px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:all .15s}
.sci:hover{border-color:var(--border2)}
.sci.sel{border-color:var(--blue);background:rgba(50,120,216,.08)}
.scn{font-size:12px;font-weight:500;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.scb{display:flex;gap:2px;height:4px;border-radius:2px;overflow:hidden;margin-bottom:2px}
.scbs{height:100%}
.scs{font-size:10px;color:var(--text2);line-height:1.5}

/* Chart */
.cp{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;min-width:0}
.cw{flex:1;position:relative;padding:14px;min-height:0;overflow:hidden}
#cv{display:block;width:100%;height:100%;touch-action:none}

/* Relationships */
.rel-view{position:absolute;inset:14px;display:none;flex-direction:column;gap:12px;background:linear-gradient(180deg,rgba(24,28,37,.98),rgba(15,17,23,.98));border:1px solid var(--border);border-radius:12px;padding:14px;z-index:20}
.rel-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rel-head{display:flex;flex-direction:column;gap:3px}
.rel-title{font-size:18px;font-weight:700}
.rel-sub{font-size:12px;color:var(--text2);line-height:1.5}
.rel-actions{display:flex;align-items:center;gap:8px}
.rel-meta{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.rel-chip{font-size:11px;color:var(--text2);padding:4px 8px;border:1px solid var(--border2);border-radius:999px;background:rgba(255,255,255,.03)}
.rel-stage{position:relative;flex:1;min-height:0;border:1px solid var(--border);border-radius:10px;background:
  radial-gradient(circle at 20% 20%, rgba(50,120,216,.08), transparent 22%),
  radial-gradient(circle at 80% 30%, rgba(26,158,110,.08), transparent 24%),
  linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,.005));overflow:hidden;touch-action:none;user-select:none}
.rel-stage::before{content:"";position:absolute;inset:18px;border-radius:16px;border:1px dashed rgba(255,255,255,.05);pointer-events:none}
.rel-stage.is-pannable{cursor:grab}
.rel-stage.is-panning{cursor:grabbing}
.rel-svg{width:100%;height:100%;display:block}
.rel-svg text{user-select:none}
.rel-empty{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;color:var(--text2);font-size:13px;line-height:1.7;padding:24px}
.rel-note{font-size:11px;color:var(--text3);line-height:1.6}
.rel-link{color:#9ec5ff;cursor:pointer;text-decoration:underline;text-decoration-color:rgba(158,197,255,.4);text-underline-offset:2px}
.rel-link:hover{color:#cfe1ff}

/* Overlay */
.ov{position:absolute;inset:0;background:rgba(15,17,23,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:50;border-radius:10px}
.ov.hide{display:none}
.ov-msg{font-size:13px;color:var(--text2);text-align:center;max-width:320px;line-height:1.7}
.pb{width:200px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--blue);border-radius:2px;transition:width .25s}

/* Stats */
.sb2{display:flex;border-top:1px solid var(--border);padding:7px 18px;gap:20px;flex-shrink:0;background:var(--bg2)}
.st{display:flex;align-items:center;gap:7px}
.std{width:9px;height:9px;border-radius:50%}
.stl{font-size:11px;color:var(--text2)}
.stv{font-size:14px;font-weight:600}
.c-l{color:var(--green)}.c-w{color:var(--amber)}.c-g{color:var(--red)}.c-i{color:var(--blue)}

/* Legend */
.leg{display:flex;flex-wrap:wrap;gap:7px;padding:5px 18px;border-top:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);cursor:pointer;padding:2px 6px;border-radius:4px;border:1px solid transparent}
.li:hover{border-color:var(--border2)}
.li.dim{opacity:.28}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* Tooltip */
.tt{position:fixed;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;pointer-events:none;z-index:999;display:none;min-width:175px;box-shadow:0 6px 20px rgba(0,0,0,.45)}
.tth{font-size:14px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.ttr{display:flex;justify-content:space-between;gap:18px;font-size:12px;margin-bottom:2px}
.ttk{color:var(--text2)}.ttv{font-weight:500}

/* Error box */
.err-box{background:rgba(216,64,64,.1);border:1px solid rgba(216,64,64,.3);border-radius:var(--r);padding:12px 16px;max-width:340px;font-size:13px;color:var(--text2);line-height:1.7;text-align:center}
.err-box b{color:var(--red)}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="hdr">
    <div>
      <div class="hdr-title">SET50 Relative Rotation Graph</div>
      <div class="hdr-sub" id="lastUpd">กำลังตรวจสอบ server...</div>
    </div>
    <span class="badge b-warn" id="srcBadge">ตรวจสอบ...</span>
    <div class="hdr-right">
      <span id="benchmarkLabel" style="font-size:12px;color:var(--text2)">Benchmark: loading...</span>
    </div>
  </div>

  <!-- Controls -->
  <div class="ctrl-bar">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="cl">Timeframe</span>
      <div class="bg">
        <button          id="tf-5m"     onclick="setTF('5m')">5m</button>
        <button          id="tf-15m"    onclick="setTF('15m')">15m</button>
        <button class="on" id="tf-daily"   onclick="setTF('daily')">Daily</button>
        <button          id="tf-weekly"  onclick="setTF('weekly')">Weekly</button>
        <button          id="tf-monthly" onclick="setTF('monthly')">Monthly</button>
      </div>
    </div>
    <div class="sep"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="cl">Tail</span>
      <div class="bg">
        <button id="tl-4"  onclick="setTail(4)">4</button>
        <button id="tl-6"  onclick="setTail(6)" class="on">6</button>
        <button id="tl-8"  onclick="setTail(8)">8</button>
        <button id="tl-12" onclick="setTail(12)">12</button>
      </div>
    </div>
    <div class="sep"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="cl">View</span>
      <div class="bg">
        <button class="on" id="vw-all"    onclick="setView('all')">ทั้งหมด</button>
        <button          id="vw-sector" onclick="setView('sector')">By Sector</button>
      </div>
    </div>
    <div class="sep"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="cl">Mode</span>
      <div class="bg">
        <button class="on" id="md-price" onclick="setPanelMode('price')">Price</button>
        <button          id="md-relations" onclick="setPanelMode('relations')">Shareholder</button>
      </div>
    </div>
    <div class="sep"></div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="cl">Bubble Size</span>
      <div class="bg">
        <button class="on" id="sz-weight" onclick="setSizeMode('weight')">SET50 Weight</button>
        <button          id="sz-market_cap" onclick="setSizeMode('market_cap')">Market Cap</button>
        <button          id="sz-avg_trading_value" onclick="setSizeMode('avg_trading_value')">Avg Value</button>
      </div>
    </div>
    <div class="sep"></div>
    <div class="impact-wrap">
      <button class="btn" id="impactBtn" type="button" onclick="toggleImpactPanel()" aria-expanded="false">Impact: Top 20</button>
    </div>
    <div class="sep"></div>
    <button class="btn" type="button" onclick="resetChartZoom()" style="color:var(--text)">Reset Zoom</button>
    <div class="sep"></div>
    <button class="btn" id="loadBtn" onclick="loadData()">
      <span class="spin" id="sp"></span>
      ⬇ โหลดข้อมูล
    </button>
    <span id="progNote" style="font-size:11px;color:var(--text3)"></span>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sb">
      <div class="sb-tabs">
        <div class="sb-tab on" onclick="sideTab('stocks',this)">หุ้น</div>
        <div class="sb-tab"   onclick="sideTab('sectors',this)">Sector</div>
      </div>
      <div class="sb-body" id="sbStocks"></div>
      <div class="sb-body" id="sbSectors" style="display:none"></div>
    </div>

    <!-- Chart panel -->
    <div class="cp">
      <div class="cw" id="cw">
        <canvas id="cv"></canvas>
        <div class="rel-view" id="relView">
          <div class="rel-top">
            <div class="rel-actions">
            <button class="btn" type="button" onclick="closeRelationships()" style="color:var(--text)">← Back</button>
              <button class="btn" type="button" onclick="resetRelationshipView()" style="color:var(--text)">Reset View</button>
            </div>
            <div class="rel-head">
              <div class="rel-title" id="relTitle">Relationships</div>
              <div class="rel-sub" id="relSub">กำลังโหลด...</div>
            </div>
            <div class="rel-meta" id="relMeta"></div>
          </div>
          <div class="rel-stage">
            <svg class="rel-svg" id="relSvg" viewBox="0 0 1320 720" preserveAspectRatio="xMidYMid meet"></svg>
            <div class="rel-empty" id="relEmpty"></div>
          </div>
          <div class="rel-note" id="relNote"></div>
        </div>
        <div class="ov" id="ov">
          <div style="font-size:28px">📊</div>
          <div class="ov-msg" id="ovMsg">กำลังตรวจสอบ server...</div>
        </div>
      </div>

      <div class="sb2">
        <div class="st"><div class="std" style="background:var(--green)"></div><span class="stl">Leading</span>  <span class="stv c-l" id="cl">—</span></div>
        <div class="st"><div class="std" style="background:var(--amber)"></div><span class="stl">Weakening</span><span class="stv c-w" id="cw2">—</span></div>
        <div class="st"><div class="std" style="background:var(--red)"></div>  <span class="stl">Lagging</span>  <span class="stv c-g" id="cg">—</span></div>
        <div class="st"><div class="std" style="background:var(--blue)"></div> <span class="stl">Improving</span><span class="stv c-i" id="ci">—</span></div>
        <span style="margin-left:auto;font-size:11px;color:var(--text3)" id="tfNote"></span>
      </div>
      <div class="leg" id="leg"></div>
    </div>
  </div>
</div>

<div class="impact-pop" id="impactPop">
  <div class="impact-head">
    <div>
      <div class="impact-title">SET50 Impact Universe</div>
      <div class="impact-summary" id="impactSummary">Top 20 selected</div>
    </div>
    <button class="btn impact-close" type="button" title="Close" aria-label="Close" onclick="toggleImpactPanel(false)">×</button>
  </div>
  <div class="impact-actions">
    <span class="cl">Top</span>
    <input class="impact-input" id="impactTopInput" type="number" min="1" max="50" value="20" aria-label="Top impact count">
    <button class="btn" type="button" onclick="applyImpactTop()">Apply</button>
    <button class="btn" type="button" onclick="selectAllImpact()">All</button>
    <button class="btn" type="button" onclick="clearImpactSelection()">None</button>
  </div>
  <div class="impact-list" id="impactList"></div>
</div>

<div class="tt" id="tt"></div>

<script>
const DATA_FILES = {
  '5m':'./data-5m.json',
  '15m':'./data-15m.json',
  daily:'./data-daily.json',
  weekly:'./data-weekly.json',
  monthly:'./data-monthly.json'
};
const REL_FILE = './relationships.json';
const REL_VIEWBOX = {w:1200,h:720};

const TICKERS = [
  {t:'ADVANC',s:'Telecom'},{t:'AOT',s:'Transport'},{t:'AWC',s:'Property'},{t:'BCP',s:'Energy'},
  {t:'BBL',s:'Banking'},{t:'BDMS',s:'Healthcare'},{t:'BEM',s:'Transport'},{t:'BH',s:'Healthcare'},
  {t:'BJC',s:'Commerce'},{t:'BTS',s:'Transport'},{t:'CBG',s:'Food & Bev'},{t:'CCET',s:'Electronics'},
  {t:'CENTEL',s:'Hotels'},{t:'COM7',s:'Commerce'},{t:'CPALL',s:'Commerce'},{t:'CPF',s:'Food & Bev'},
  {t:'CPN',s:'Property'},{t:'CRC',s:'Commerce'},{t:'DELTA',s:'Electronics'},{t:'EGCO',s:'Utilities'},
  {t:'GPSC',s:'Utilities'},{t:'GULF',s:'Energy'},{t:'HMPRO',s:'Commerce'},{t:'IVL',s:'Petrochems'},
  {t:'KBANK',s:'Banking'},{t:'KKP',s:'Banking'},{t:'KTB',s:'Banking'},{t:'KTC',s:'Finance'},
  {t:'LH',s:'Property'},{t:'MINT',s:'Hotels'},{t:'MTC',s:'Finance'},{t:'OR',s:'Energy'},
  {t:'OSP',s:'Food & Bev'},{t:'PTT',s:'Energy'},{t:'PTTEP',s:'Energy'},{t:'PTTGC',s:'Petrochems'},
  {t:'RATCH',s:'Utilities'},{t:'SAWAD',s:'Finance'},{t:'SCB',s:'Banking'},{t:'SCC',s:'Materials'},
  {t:'SCGP',s:'Materials'},{t:'TCAP',s:'Banking'},{t:'TIDLOR',s:'Finance'},{t:'TISCO',s:'Banking'},
  {t:'TLI',s:'Finance'},{t:'TOP',s:'Energy'},{t:'TRUE',s:'Telecom'},{t:'TTB',s:'Banking'},
  {t:'TU',s:'Food & Bev'},{t:'WHA',s:'Industrial'}
];

const SC = {
  Energy:'#378ADD',Banking:'#1D9E75',Commerce:'#D4537E',Materials:'#BA7517',
  Telecom:'#9F7FE0',Healthcare:'#E8773A',Property:'#639922','Food & Bev':'#7db5b8',
  Utilities:'#4A90D9',Hotels:'#c0566e',Finance:'#5aaa60',Auto:'#c9952f',
  Industrial:'#2fb5a0',Petrochems:'#7A5CB5',Electronics:'#E24B4A',Media:'#a08060',
  Transport:'#aaaaaa'
};
const QC = {Leading:'#1a9e6e',Weakening:'#c47f12',Lagging:'#d84040',Improving:'#3278d8'};
const QB = {Leading:'rgba(26,158,110,.07)',Weakening:'rgba(196,127,18,.07)',Lagging:'rgba(216,64,64,.07)',Improving:'rgba(50,120,216,.07)'};
const IMPACT_RANK = [
  {t:'DELTA',w:12.5},{t:'ADVANC',w:7.8},{t:'PTT',w:8.5},{t:'BDMS',w:4.8},{t:'AOT',w:7.4},
  {t:'GULF',w:5.8},{t:'CPALL',w:5.4},{t:'PTTEP',w:4.4},{t:'SCB',w:3.8},{t:'KBANK',w:3.6},
  {t:'BBL',w:3.4},{t:'SCC',w:3.2},{t:'CPN',w:2.8},{t:'TRUE',w:2.5},{t:'KTB',w:2.2},
  {t:'CRC',w:1.8},{t:'BH',w:1.7},{t:'GPSC',w:1.6},{t:'MINT',w:1.5},{t:'HMPRO',w:1.4},
  {t:'TOP',w:1.3},{t:'CPF',w:1.2},{t:'IVL',w:1.1},{t:'SCGP',w:1},{t:'BEM',w:.95},
  {t:'EGCO',w:.9},{t:'WHA',w:.85},{t:'OR',w:.8},{t:'TTB',w:.75},{t:'PTTGC',w:.7},
  {t:'TLI',w:.65},{t:'TU',w:.6},{t:'KTC',w:.55},{t:'LH',w:.5},{t:'TISCO',w:.48},
  {t:'MTC',w:.45},{t:'BCP',w:.42},{t:'CENTEL',w:.4},{t:'CBG',w:.38},{t:'SAWAD',w:.35},
  {t:'COM7',w:.32},{t:'BJC',w:.3},{t:'RATCH',w:.28},{t:'KKP',w:.25},{t:'TCAP',w:.22},
  {t:'TIDLOR',w:.2},{t:'OSP',w:.18},{t:'AWC',w:.15},{t:'CCET',w:.12},{t:'BTS',w:.1}

async function ensureRelationshipsLoaded(){
  if(relData) return relData;
  const res=await fetch(REL_FILE,{cache:'no-cache'});
  if(!res.ok) throw new Error(`โหลด ${REL_FILE} ไม่สำเร็จ`);
  relData=await res.json();
  relMaps=new Map((relData.graphs||[]).map(g=>[g.focusSymbol,g]));
  relNodeGraphs=new Map();
  relDerivedCache=new Map();
  for(const graph of relData.graphs||[]){
    for(const node of graph.nodes||[]){
      if(!node.symbol||relMaps.has(node.symbol)||relNodeGraphs.has(node.symbol)) continue;
      relNodeGraphs.set(node.symbol,graph);
    }
  }
  return relData;
}
function getTickerMeta(symbol){
  if(!symbol) return null;
  if(TICKER_META.has(symbol)) return TICKER_META.get(symbol);
  if(relMaps.has(symbol)){
    const graph=relMaps.get(symbol);
    const node=graph.nodes.find(n=>n.symbol===symbol);
    if(node) return {symbol,sector:null,label:node.label||symbol};
  }
  if(relNodeGraphs.has(symbol)){
    const graph=relNodeGraphs.get(symbol);
    const node=graph.nodes.find(n=>n.symbol===symbol);
    if(node) return {symbol,sector:null,label:node.label||symbol};
  }
  return null;
}
function getResultBySymbol(symbol){

}
function hasRelationships(symbol){return !!getRelationshipKind(symbol)}
function buildDerivedRelationshipGraph(symbol){
  if(relDerivedCache.has(symbol)) return relDerivedCache.get(symbol);
  const baseGraph=relNodeGraphs.get(symbol);
  if(!baseGraph){
    relDerivedCache.set(symbol,null);
    return null;
  }
  const focusNode=baseGraph.nodes.find(n=>n.symbol===symbol);
  if(!focusNode){
    relDerivedCache.set(symbol,null);
    return null;
  }
  const focusId=focusNode.id;
  const primaryEdges=(baseGraph.edges||[]).filter(edge=>edge.source===focusId||edge.target===focusId);
  if(!primaryEdges.length){
    relDerivedCache.set(symbol,null);
    return null;
  }
  const nodeIds=new Set([focusId]);
  primaryEdges.forEach(edge=>{nodeIds.add(edge.source);nodeIds.add(edge.target)});
  const secondaryEdges=(baseGraph.edges||[]).filter(edge=>edge.source!==focusId&&edge.target!==focusId&&(nodeIds.has(edge.source)||nodeIds.has(edge.target)));
  secondaryEdges.forEach(edge=>{nodeIds.add(edge.source);nodeIds.add(edge.target)});
  const derived={
    id:`${symbol.toLowerCase()}_derived_map`,
    focusSymbol:symbol,
    focusLabel:focusNode.label||symbol,
    laneLabels:{...REL_DEFAULT_LANES},
    assessment:{
      worksForModel:true,
      why:[`Derived from the ${baseGraph.focusSymbol} ownership map so ${symbol} can open as its own relationship view.`],
      recommendedDefaultFilters:[
        `Source graph: ${baseGraph.focusSymbol}`,
        'Blue links still come from documented ownership data',
        'Use this as a drill-down until a dedicated map is added'
      ]
    },
    nodes:(baseGraph.nodes||[]).filter(node=>nodeIds.has(node.id)).map(node=>({...node,tags:[...(node.tags||[])]})),
    edges:[...primaryEdges,...secondaryEdges].map(edge=>({...edge,sourceRefs:[...(edge.sourceRefs||[])]}))
  };
  relDerivedCache.set(symbol,derived);
  return derived;
}
function getBubbleMetricValue(entry){
  return Number(entry?.sizes?.set50_weight||entry?.sizes?.market_cap||entry?.sizes?.avg_trading_value||0);
}
function getRrgDistance(a,b){
  if(!a?.last||!b?.last) return Number.POSITIVE_INFINITY;
  const dx=(a.last.rsRatio||0)-(b.last.rsRatio||0);
  const dy=(a.last.rsMom||0)-(b.last.rsMom||0);
  return Math.sqrt(dx*dx+dy*dy);
}
function buildAutoRelationshipGraph(symbol){
  const meta=getTickerMeta(symbol)||{symbol,sector:'Unknown',label:symbol};
  const focusResult=getResultBySymbol(symbol);
  const sector=focusResult?.sector||meta.sector||'Unknown';
  const focusNode={
    id:`auto_focus_${symbol}`,
    label:meta.label||symbol,
    kind:'listed_company',
    symbol,
    market:'SET',
    country:'TH',
    displayShape:'circle',
    tags:['focus','auto_generated']
  };
  const sectorPeers=focusResult
    ? results
      .filter(item=>item.name!==symbol&&item.sector===sector)
      .sort((a,b)=>getBubbleMetricValue(b)-getBubbleMetricValue(a)||a.name.localeCompare(b.name))
      .slice(0,8)
    : [];
  const used=new Set(sectorPeers.map(item=>item.name));
  const nearestPeers=focusResult
    ? results
      .filter(item=>item.name!==symbol&&!used.has(item.name))
      .sort((a,b)=>getRrgDistance(a,focusResult)-getRrgDistance(b,focusResult)||a.name.localeCompare(b.name))
      .slice(0,8)
    : [];
  const nodes=[focusNode];
  const edges=[];
  for(const item of sectorPeers){
    nodes.push({
      id:`auto_sector_${item.name}`,
      label:item.name,
      kind:'listed_company',
      symbol:item.name,
      market:'SET',
      country:'TH',
      displayShape:'circle',
      tags:['auto_generated','sector_peer']
    });
    edges.push({
      source:`auto_sector_${item.name}`,
      target:focusNode.id,
      relation:'sector_peer',
      directness:'context',
      asOfDate:REL_SNAPSHOT_DATE,
      sourceRefs:[],
      notes:`Same sector as ${symbol}`,
      displayLabel:''
    });
  }
  for(const item of nearestPeers){
    nodes.push({
      id:`auto_rrg_${item.name}`,
      label:item.name,
      kind:'listed_company',
      symbol:item.name,
      market:'SET',
      country:'TH',
      displayShape:'circle',
      tags:['auto_generated','rrg_neighbor']
    });
    edges.push({
      source:focusNode.id,
      target:`auto_rrg_${item.name}`,
      relation:'rrg_neighbor',
      directness:'context',
      asOfDate:REL_SNAPSHOT_DATE,
      sourceRefs:[],
      notes:`Nearest current RRG neighbor for ${symbol}`,
      displayLabel:''
    });
  }
  return {
    id:`${symbol.toLowerCase()}_auto_context`,
    focusSymbol:symbol,
    focusLabel:meta.label||symbol,
    laneLabels:{
      incoming:'Sector Peers',
      focus:'Focus',
      outgoing:'Nearest RRG',
      secondary:'Second Layer'
    },
    assessment:{
      worksForModel:false,
      why:[`Auto-generated market context for ${symbol}. A dedicated ownership map has not been added yet.`],
      recommendedDefaultFilters:[
        `Sector: ${sector}`,
        'Left = biggest same-sector SET50 peers',
        `Right = nearest names in the current ${TF_CONTEXT[tf]||tf} view`,
        'This fallback is market context, not shareholder ownership'
      ]
    },
    nodes,
    edges
  };
}

function wrapRelText(text,maxChars=24,maxLines=2){
  const words=String(text||'').split(/\s+/).filter(Boolean);
  if(!words.length) return [''];
  const lines=[];
  let line='';
  for(const word of words){
    const next=line?`${line} ${word}`:word;
    if(next.length<=maxChars||!line){
      line=next;
      continue;
    }
    lines.push(line);
    line=word;
    if(lines.length===maxLines-1) break;
  }
  if(line&&lines.length<maxLines) lines.push(line);
  const usedWords=lines.join(' ').split(/\s+/).filter(Boolean).length;
  if(usedWords<words.length&&lines.length){
    const last=lines[lines.length-1];
    lines[lines.length-1]=(last.length>maxChars-2?last.slice(0,maxChars-2):last)+'...';
  }
  return lines.slice(0,maxLines);
}
function buildRelTextBlock(lines,x,y,fontSize=12,fill='var(--text)',weight='700',anchor='middle'){
  const offset=(lines.length-1)*7.5;
  return `<text x="${x}" y="${y-offset}" text-anchor="${anchor}" fill="${fill}" font-size="${fontSize}" font-weight="${weight}">${lines.map((line,i)=>`<tspan x="${x}" dy="${i===0?0:15}">${escapeHtml(line)}</tspan>`).join('')}</text>`;
}
function estimateRelLineWidth(text,fontSize=12){
  return Math.max(18,String(text||'').length*fontSize*0.58);
}
function buildRelNodeBox(placement,lines,fontSize,sub=''){
  const textWidths=lines.map(line=>estimateRelLineWidth(line,fontSize));
  if(sub) textWidths.push(estimateRelLineWidth(sub,10.5));
  const width=Math.max(...textWidths,42);
  const lineHeight=14;
  const textHeight=(lines.length-1)*lineHeight+fontSize;
  const subGap=sub?16:0;
  const height=textHeight+subGap+(sub?10.5:0);
  let left,right;
  if(placement.side==='focus'){
    left=placement.textX-width/2-14;
    right=placement.textX+width/2+14;
  }else if(placement.side==='incoming'){
    right=placement.anchorX-8;
    left=right-width-26;
  }else if(placement.side==='outgoing'||placement.side==='secondary'){
    left=placement.textX-8;
    right=left+width+26;
  }else{
    left=placement.textX-8;
    right=placement.textX+width+14;
  }
  const top=(placement.side==='focus'?placement.y-34:placement.y-22);
  const bottom=top+height+8;
  return {left,right,top,bottom,width:right-left,height:bottom-top};
}

function edgeLabel(edgeGroup){

    const e=edgeGroup[0];
    if(e.displayLabel!=null) return e.displayLabel;

    return `${pct}${e.directness||e.relation}`;
  }).join(' / ');

function buildRelationshipView(graph){
  const nodesById=new Map(graph.nodes.map(n=>[n.id,n]));
  const focus=graph.nodes.find(n=>n.symbol===graph.focusSymbol)||graph.nodes[0];
  const incomingEdges=graph.edges.filter(e=>e.target===focus.id);
  const outgoingEdges=graph.edges.filter(e=>e.source===focus.id&&e.target!==focus.id);
  const outgoingIds=new Set(outgoingEdges.map(e=>e.target));
  const secondaryEdges=graph.edges.filter(e=>e.source!==focus.id&&e.target!==focus.id&&(outgoingIds.has(e.source)||outgoingIds.has(e.target)));
  const displayIds=new Set([focus.id]);
  incomingEdges.forEach(e=>displayIds.add(e.source));
  outgoingEdges.forEach(e=>displayIds.add(e.target));
  secondaryEdges.forEach(e=>{displayIds.add(e.source);displayIds.add(e.target)});
  const incomingNodes=[...new Set(incomingEdges.map(e=>e.source))].map(id=>nodesById.get(id)).filter(Boolean);
  const outgoingNodes=[...new Set(outgoingEdges.map(e=>e.target))].map(id=>nodesById.get(id)).filter(Boolean);
  const secondaryNodes=[...new Set(secondaryEdges.flatMap(e=>[e.source,e.target]).filter(id=>id!==focus.id&&!incomingNodes.some(n=>n.id===id)&&!outgoingNodes.some(n=>n.id===id)))]
    .map(id=>nodesById.get(id)).filter(Boolean);
  const allEdges=graph.edges.filter(e=>displayIds.has(e.source)&&displayIds.has(e.target)&&e.source!==e.target);
  const groupedEdges=new Map();
  for(const e of allEdges){
    const key=`${e.source}->${e.target}`;
    if(!groupedEdges.has(key)) groupedEdges.set(key,[]);
    groupedEdges.get(key).push(e);
  }
  return {focus,incomingNodes,outgoingNodes,secondaryNodes,allEdges:[...groupedEdges.values()]};
}
function layoutLane(nodes,x,y0,y1){

  const step=(y1-y0)/(nodes.length+1);
  return nodes.map((n,i)=>({node:n,x,y:y0+step*(i+1)}));
}

    </g>`;
}
function edgeMarkup(group,positions){
  const first=group[0];
  const s=positions.get(first.source), t=positions.get(first.target);
  if(!s||!t) return '';
  const dx=t.x-s.x;
  const c1x=s.x+dx*0.35, c2x=s.x+dx*0.65;

function getSizeMetric(item,mode=sizeMode){
  const key=SIZE_META[mode]?.key;
  const value=item?.sizes?.[key];

}
function formatCompactTHB(v){
  const abs=Math.abs(v);
  if(abs>=1e12) return `THB ${(v/1e12).toFixed(2)}T`;
  if(abs>=1e9) return `THB ${(v/1e9).toFixed(2)}B`;
  if(abs>=1e6) return `THB ${(v/1e6).toFixed(2)}M`;
  if(abs>=1e3) return `THB ${(v/1e3).toFixed(1)}K`;
  return `THB ${v.toFixed(0)}`;
}
function formatSizeValue(v,mode=sizeMode){
  if(v==null) return 'n/a';
  if(mode==='weight') return `${v.toFixed(2)}%`;
  return formatCompactTHB(v);
}
function makeRadiusScaler(items){
  const values=items.map(s=>getSizeMetric(s)).filter(v=>v!=null&&v>0);
  const minR=view==='sector'?7.5:5.5;
  const maxR=view==='sector'?18:12;
  if(!values.length){
    return (_item,isActive=false)=>minR+(isActive?1.5:0);
  }
  const minV=Math.min(...values), maxV=Math.max(...values);
  return (item,isActive=false)=>{
    const value=getSizeMetric(item);
    let radius=minR;
    if(value!=null&&value>0){
      if(maxV>minV){
        radius=minR+Math.sqrt((value-minV)/(maxV-minV))*(maxR-minR);
      }else{
        radius=(minR+maxR)/2;
      }
    }
    if(isActive) radius+=1.5;
    return radius;
  };
}
function getVisibleResults(){

function getBaseExtents(vis){
  let ar=[],am=[];
  for(const s of vis) for(const p of s.tail){ar.push(p.rsRatio);am.push(p.rsMom)}
  if(!ar.length) return null;
  const pad=2.5;
  return {r0:Math.min(...ar,100)-pad,r1:Math.max(...ar,100)+pad,m0:Math.min(...am,100)-pad,m1:Math.max(...am,100)+pad};
}
function clampExtents(ext,base){
  const baseW=base.r1-base.r0, baseH=base.m1-base.m0;
  const minW=baseW*0.18, minH=baseH*0.18;
  const w=Math.min(Math.max(ext.r1-ext.r0,minW),baseW);
  const h=Math.min(Math.max(ext.m1-ext.m0,minH),baseH);
  let r0=ext.r0, r1=r0+w, m0=ext.m0, m1=m0+h;
  if(w>=baseW){r0=base.r0;r1=base.r1}else{
    if(r0<base.r0){r1+=base.r0-r0;r0=base.r0}
    if(r1>base.r1){r0-=r1-base.r1;r1=base.r1}
  }
  if(h>=baseH){m0=base.m0;m1=base.m1}else{
    if(m0<base.m0){m1+=base.m0-m0;m0=base.m0}
    if(m1>base.m1){m0-=m1-base.m1;m1=base.m1}
  }
  return {r0,r1,m0,m1};
}
function getCurrentExtents(vis){
  const base=getBaseExtents(vis);
  if(!base) return null;
  if(!chartZoom) return base;
  return clampExtents(chartZoom,base);
}

// ── RS Calculation ────────────────────────────────────────
function ema(arr,p){const k=2/(p+1),r=[arr[0]];for(let i=1;i<arr.length;i++)r.push(arr[i]*k+r[i-1]*(1-k));return r}
function calcRS(aligned){
  if(aligned.length<getMinHistoryPoints())return[];
  const rs=aligned.map(p=>p.stock/p.bench*100);
  const e1=ema(rs,14),e2=ema(e1,10);
  const mn=e2.reduce((a,b)=>a+b,0)/e2.length;
  const sd=Math.sqrt(e2.reduce((a,v)=>a+(v-mn)**2,0)/e2.length)||1;
  const ratio=e2.map(v=>100+(v-mn)/sd*2);
  const rawM=ratio.map((v,i)=>i===0?100:100+(v-ratio[i-1])*5);
  const mom=ema(rawM,10);
  return aligned.map((p,i)=>({t:p.t,rsRatio:ratio[i],rsMom:mom[i]}));
}

function quad(r,m){return r>=100&&m>=100?'Leading':r<100&&m>=100?'Weakening':r<100&&m<100?'Lagging':'Improving'}

function draw(){
  if(relMode){renderRelationships();return}

    cx=cv.getContext('2d');
  }
  attachCanvasInteractions();
  const wrap=document.getElementById('cw');
  cv.width=wrap.clientWidth; cv.height=wrap.clientHeight;
  const W=cv.width,H=cv.height,P={l:54,r:22,t:22,b:42};
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  cx.clearRect(0,0,W,H);
  if(!results.length)return;

  const vis=getVisibleResults();
  if(!vis.length){
    cx.fillStyle='rgba(255,255,255,.42)';
    cx.font='13px Inter,system-ui';
    cx.textAlign='center';
    cx.fillText('Select stocks from the Impact control',W/2,H/2);
    ['cl','cw2','cg','ci'].forEach(id=>document.getElementById(id).textContent='0');
    return;
  }
  const ext=getCurrentExtents(vis);
  if(!ext)return;
  const {r0,r1,m0,m1}=ext;
  const tx=v=>P.l+(v-r0)/(r1-r0)*pw;
  const ty=v=>P.t+ph-(v-m0)/(m1-m0)*ph;
  const cx0=tx(100),cy0=ty(100);

  // Quadrant BG
  [{x:P.l,y:P.t,w:cx0-P.l,h:cy0-P.t,q:'Weakening'},
   {x:cx0,y:P.t,w:W-P.r-cx0,h:cy0-P.t,q:'Leading'},
   {x:P.l,y:cy0,w:cx0-P.l,h:H-P.b-cy0,q:'Lagging'},
   {x:cx0,y:cy0,w:W-P.r-cx0,h:H-P.b-cy0,q:'Improving'}
  ].forEach(q=>{cx.fillStyle=QB[q.q];cx.fillRect(q.x,q.y,q.w,q.h)});

  // Grid
  cx.strokeStyle='rgba(255,255,255,.04)';cx.lineWidth=.5;
  for(let v=Math.ceil(r0);v<=Math.floor(r1);v++){cx.beginPath();cx.moveTo(tx(v),P.t);cx.lineTo(tx(v),H-P.b);cx.stroke()}
  for(let v=Math.ceil(m0);v<=Math.floor(m1);v++){cx.beginPath();cx.moveTo(P.l,ty(v));cx.lineTo(W-P.r,ty(v));cx.stroke()}

  // Axes
  cx.strokeStyle='rgba(255,255,255,.2)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(cx0,P.t-4);cx.lineTo(cx0,H-P.b+4);cx.stroke();
  cx.beginPath();cx.moveTo(P.l-4,cy0);cx.lineTo(W-P.r+4,cy0);cx.stroke();

  // Labels
  cx.fillStyle='rgba(255,255,255,.3)';cx.font='11px Inter,system-ui';
  cx.textAlign='center';cx.fillText('RS-Ratio →',P.l+pw/2,H-8);
  cx.save();cx.translate(12,P.t+ph/2);cx.rotate(-Math.PI/2);cx.fillText('RS-Momentum ↑',0,0);cx.restore();
  cx.fillText('100',cx0,H-P.b+13);cx.textAlign='right';cx.fillText('100',P.l-4,cy0+4);
  [{x:P.l+5,y:P.t+13,t:'Weakening',a:'left',q:'Weakening'},
   {x:W-P.r-5,y:P.t+13,t:'Leading',a:'right',q:'Leading'},
   {x:P.l+5,y:H-P.b-5,t:'Lagging',a:'left',q:'Lagging'},
   {x:W-P.r-5,y:H-P.b-5,t:'Improving',a:'right',q:'Improving'}
  ].forEach(q=>{cx.fillStyle=QC[q.q];cx.globalAlpha=.38;cx.textAlign=q.a;cx.font='11px Inter,system-ui';cx.fillText(q.t,q.x,q.y)});
  cx.globalAlpha=1;

  const display=view==='sector'?bySector(vis):vis;
  const radiusFor=makeRadiusScaler(display);
  for(const s of display){
    const isH=hov&&hov.name===s.name,isS=sel===s.name;
    const dim=(hov||sel)&&!isH&&!isS;
    const ba=dim?.1:1;
    for(let i=0;i<s.tail.length-1;i++){
      const p0=s.tail[i],p1=s.tail[i+1];
      const al=.15+.85*(i/(s.tail.length-1));
      cx.globalAlpha=ba*al;
      cx.strokeStyle=s.color;cx.lineWidth=isH||isS?2:1.2;
      cx.beginPath();cx.moveTo(tx(p0.rsRatio),ty(p0.rsMom));cx.lineTo(tx(p1.rsRatio),ty(p1.rsMom));cx.stroke();
      if(i===s.tail.length-2){
        const ang=Math.atan2(ty(p1.rsMom)-ty(p0.rsMom),tx(p1.rsRatio)-tx(p0.rsRatio));
        cx.globalAlpha=ba*.65;cx.fillStyle=s.color;
        cx.save();cx.translate(tx(p1.rsRatio),ty(p1.rsMom));cx.rotate(ang);
        cx.beginPath();cx.moveTo(5,0);cx.lineTo(-4,-3);cx.lineTo(-4,3);cx.closePath();cx.fill();cx.restore();
      }
    }
    const L=s.tail[s.tail.length-1],dx=tx(L.rsRatio),dy=ty(L.rsMom),r=radiusFor(s,isH||isS);
    cx.globalAlpha=ba;
    cx.beginPath();cx.arc(dx,dy,r,0,Math.PI*2);cx.fillStyle=s.color;cx.fill();
    if(isH||isS){cx.strokeStyle='#fff';cx.lineWidth=1.5;cx.stroke()}
    cx.globalAlpha=ba*(isH||isS?.95:.6);
    cx.fillStyle=isH||isS?'#fff':'#bbb';cx.font=(isH||isS?'11px':'9.5px')+' Inter,system-ui';
    cx.textAlign='left';cx.fillText(s.name,dx+r+3,dy+4);
  }
  cx.globalAlpha=1;

  const ct={Leading:0,Weakening:0,Lagging:0,Improving:0};
  for(const s of vis)ct[quad(s.last.rsRatio,s.last.rsMom)]++;
  document.getElementById('cl').textContent=ct.Leading;
  document.getElementById('cw2').textContent=ct.Weakening;
  document.getElementById('cg').textContent=ct.Lagging;
  document.getElementById('ci').textContent=ct.Improving;
}

function bySector(vis){
  const m={};
  for(const s of vis){
    if(!m[s.sector])m[s.sector]={name:s.sector,sector:s.sector,color:s.color,tails:[],sizes:{set50_weight:0,market_cap:0,avg_trading_value:0}};
    m[s.sector].tails.push(s.tail);
    m[s.sector].sizes.set50_weight+=(s.sizes?.set50_weight||0);
    m[s.sector].sizes.market_cap+=(s.sizes?.market_cap||0);
    m[s.sector].sizes.avg_trading_value+=(s.sizes?.avg_trading_value||0);
  }
  return Object.values(m).map(d=>{
    const len=Math.min(...d.tails.map(t=>t.length));
    const tail=[];
    for(let i=0;i<len;i++){
      const r=d.tails.reduce((a,t)=>a+t[i].rsRatio,0)/d.tails.length;
      const mo=d.tails.reduce((a,t)=>a+t[i].rsMom,0)/d.tails.length;
      tail.push({rsRatio:r,rsMom:mo});
    }
    const last=tail[tail.length-1]||{rsRatio:100,rsMom:100};
    return{name:d.name,sector:d.sector,color:d.color,tail,last,sizes:d.sizes};
  });
}

function onMM(e){
  if(relMode) return;
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(cv.width/rect.width);
  const my=(e.clientY-rect.top)*(cv.height/rect.height);
  const W=cv.width,H=cv.height,P={l:54,r:22,t:22,b:42};
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  const vis=getVisibleResults();
  const ext=getCurrentExtents(vis);
  if(!ext)return;
  const {r0,r1,m0,m1}=ext;
  const tx=v=>P.l+(v-r0)/(r1-r0)*pw,ty=v=>P.t+ph-(v-m0)/(m1-m0)*ph;
  const disp=view==='sector'?bySector(vis):vis;
  const radiusFor=makeRadiusScaler(disp);
  let found=null;
  for(const s of disp){
    const L=s.tail[s.tail.length-1];
    const hitR=radiusFor(s,hov&&hov.name===s.name)+4;
    if(Math.hypot(mx-tx(L.rsRatio),my-ty(L.rsMom))<hitR){found=s;break}
  }
  const tt=document.getElementById('tt');
  if(found){
    cv.style.cursor='pointer';hov=found;

      <div class="ttr"><span class="ttk">RS-Ratio</span><span class="ttv">${found.last.rsRatio.toFixed(2)}</span></div>
      <div class="ttr"><span class="ttk">RS-Momentum</span><span class="ttv">${found.last.rsMom.toFixed(2)}</span></div>
      <div class="ttr"><span class="ttk">Quadrant</span><span class="ttv" style="color:${QC[q]}">${q}</span></div>
      <div class="ttr"><span class="ttk">Sector</span><span class="ttv">${found.sector}</span></div>

    tt.style.display='block';tt.style.left=(e.clientX+14)+'px';tt.style.top=(e.clientY-20)+'px';
  }else{cv.style.cursor='default';hov=null;tt.style.display='none'}

}
function onWheel(e){
  if(relMode||!results.length) return;
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(cv.width/rect.width);
  const my=(e.clientY-rect.top)*(cv.height/rect.height);
  const W=cv.width,H=cv.height,P={l:54,r:22,t:22,b:42};
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  const vis=getVisibleResults();
  const base=getBaseExtents(vis);
  const current=getCurrentExtents(vis);
  if(!base||!current) return;
  const dataX=current.r0+((mx-P.l)/pw)*(current.r1-current.r0);
  const dataY=current.m1-((my-P.t)/ph)*(current.m1-current.m0);
  const factor=e.deltaY<0?0.88:1.12;
  const next={
    r0:dataX-(dataX-current.r0)*factor,
    r1:dataX+(current.r1-dataX)*factor,
    m0:dataY-(dataY-current.m0)*factor,
    m1:dataY+(current.m1-dataY)*factor
  };
  const clamped=clampExtents(next,base);
  const isBase=Math.abs(clamped.r0-base.r0)<0.001&&Math.abs(clamped.r1-base.r1)<0.001&&Math.abs(clamped.m0-base.m0)<0.001&&Math.abs(clamped.m1-base.m1)<0.001;
  chartZoom=isBase?null:clamped;
  draw();
}

function clampRelViewport(next){
  const scale=Math.max(1,Math.min(2.8,next.scale));
  if(scale<=1.001) return {scale:1,x:0,y:0};
  const padX=140, padY=90;
  const minX=REL_VIEWBOX.w-(REL_VIEWBOX.w*scale)-padX;
  const maxX=padX;
  const minY=REL_VIEWBOX.h-(REL_VIEWBOX.h*scale)-padY;
  const maxY=padY;
  return {
    scale,
    x:Math.min(maxX,Math.max(minX,next.x)),
    y:Math.min(maxY,Math.max(minY,next.y))
  };
}
function relPointFromClient(evt){
  const svg=document.getElementById('relSvg');
  if(!svg||!svg.getScreenCTM()) return {x:0,y:0};
  const pt=svg.createSVGPoint();
  pt.x=evt.clientX;
  pt.y=evt.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function applyRelationshipTransform(){
  const viewport=document.getElementById('relViewport');
  if(!viewport) return;
  relViewport=clampRelViewport(relViewport);
  viewport.setAttribute('transform',`translate(${relViewport.x} ${relViewport.y}) scale(${relViewport.scale})`);
  updateRelationshipStageState();
}
function attachRelationshipInteractions(){
  const stage=document.querySelector('.rel-stage');
  if(!stage||stage.dataset.bound==='1') return;
  stage.dataset.bound='1';
  stage.addEventListener('wheel',onRelationshipWheel,{passive:false});
  stage.addEventListener('mousedown',onRelationshipDown);
  stage.addEventListener('dblclick',()=>resetRelationshipView());
  window.addEventListener('mousemove',onRelationshipDrag);
  window.addEventListener('mouseup',endRelationshipPan);
  updateRelationshipStageState();
}
function onRelationshipWheel(e){
  if(!relMode||!currentRel) return;
  e.preventDefault();
  const p=relPointFromClient(e);
  const nextScale=Math.max(1,Math.min(2.8,relViewport.scale*(e.deltaY<0?1.12:0.9)));
  const worldX=(p.x-relViewport.x)/relViewport.scale;
  const worldY=(p.y-relViewport.y)/relViewport.scale;
  relViewport=clampRelViewport({
    scale:nextScale,
    x:p.x-worldX*nextScale,
    y:p.y-worldY*nextScale
  });
  applyRelationshipTransform();
}
function onRelationshipDown(e){
  if(!relMode||!currentRel||e.button!==0) return;
  hideRelTooltip();
  relPan={start:relPointFromClient(e),x:relViewport.x,y:relViewport.y,moved:false};
  updateRelationshipStageState();
}
function onRelationshipDrag(e){
  if(!relPan||!relMode) return;
  const p=relPointFromClient(e);
  const dx=p.x-relPan.start.x;
  const dy=p.y-relPan.start.y;
  if(!relPan.moved&&Math.hypot(dx,dy)>3) relPan.moved=true;
  relViewport=clampRelViewport({scale:relViewport.scale,x:relPan.x+dx,y:relPan.y+dy});
  applyRelationshipTransform();
}
function endRelationshipPan(){
  if(!relPan) return;
  if(relPan.moved) relSuppressClickUntil=Date.now()+220;
  relPan=null;
  updateRelationshipStageState();
}

  ].filter(Boolean).join(' • ');
  if(!incomingNodes.length&&!outgoingNodes.length){

    empty.textContent='ยังไม่พบความสัมพันธ์สำหรับหุ้นนี้';
    svg.innerHTML='';
    hideRelTooltip();
    updateRelationshipStageState();
    relView.style.display='flex';
    return;
  }
  empty.style.display='none';
  const placements=new Map();
  placements.set(focus.id,{anchorX:598,textX:598,y:352,side:'focus'});
  layoutLane(incomingNodes,0,128,604).forEach(p=>placements.set(p.node.id,{anchorX:328,textX:294,y:p.y,side:'incoming'}));
  layoutLane(outgoingNodes,0,128,604).forEach(p=>placements.set(p.node.id,{anchorX:804,textX:824,y:p.y,side:'outgoing'}));
  const secondaryOrderScore=new Map();
  for(const node of secondaryNodes){
    const linkedSources=allEdges
      .map(group=>{
        const first=group[0];
        const sourcePlacement=placements.get(first.source);
        const targetPlacement=placements.get(first.target);
        if(first.target===node.id&&sourcePlacement?.side==='outgoing') return sourcePlacement;
        if(first.source===node.id&&targetPlacement?.side==='outgoing') return targetPlacement;
        return null;
      })
      .filter(p=>p?.side==='outgoing');
    const score=linkedSources.length
      ? linkedSources.reduce((sum,p)=>sum+p.y,0)/linkedSources.length
      : 9999;
    secondaryOrderScore.set(node.id,score);
  }
  const sortedSecondaryNodes=[...secondaryNodes].sort((a,b)=>{
    const sa=secondaryOrderScore.get(a.id)??9999;
    const sb=secondaryOrderScore.get(b.id)??9999;
    return sa-sb || (a.symbol||a.label||a.id).localeCompare(b.symbol||b.label||b.id);
  });
  layoutLane(sortedSecondaryNodes,0,152,580).forEach(p=>placements.set(p.node.id,{anchorX:1116,textX:1136,y:p.y,side:'secondary'}));
  const nodeById=new Map(currentRel.nodes.map(n=>[n.id,n]));
  const nodeLinesCache=new Map();
  const nodeBoxCache=new Map();
  const nodePctLabelCache=new Map();

  const getNodeLines=(nodeId)=>{
    if(nodeLinesCache.has(nodeId)) return nodeLinesCache.get(nodeId);
    const node=nodeById.get(nodeId);
    const placement=placements.get(nodeId);
    const side=placement?.side;
    const maxChars=side==='focus'?18:side==='secondary'?24:26;
    const maxLines=side==='focus'?1:3;
    const displayName=node?.symbol||compactRelDisplayName(node?.label||nodeId);
    const lines=wrapRelText(displayName,maxChars,maxLines);
    nodeLinesCache.set(nodeId,lines);
    return lines;
  };
  const getNodeBox=(nodeId)=>{
    if(nodeBoxCache.has(nodeId)) return nodeBoxCache.get(nodeId);
    const node=nodeById.get(nodeId);
    const placement=placements.get(nodeId);
    const box=buildRelNodeBox(placement,getNodeLines(nodeId),placement?.side==='focus'?28:13,relKindLabel(node||{}));
    nodeBoxCache.set(nodeId,box);
    return box;
  };
  const getNodeConnector=(nodeId,role)=>{
    const placement=placements.get(nodeId);
    if(!placement) return null;
    const box=getNodeBox(nodeId);
    if(placement.side==='focus'){
      return {
        x:role==='source'?box.right:box.left,
        y:placement.y-6
      };
    }
    if(placement.side==='incoming'){
      return {
        x:placement.anchorX-18,
        y:placement.y-5
      };
    }
    return {
      x:placement.anchorX,
      y:placement.y-5
    };
  };
  const getNodePctLabel=(nodeId)=>{
    if(nodePctLabelCache.has(nodeId)) return nodePctLabelCache.get(nodeId);
    const placement=placements.get(nodeId);
    let label='';
    if(placement?.side==='incoming'){
      const edgeGroup=allEdges.find(group=>group[0]?.source===nodeId&&group[0]?.target===focus.id);
      if(edgeGroup) label=edgeLabel(edgeGroup);
    }else if(placement?.side==='outgoing'){
      const edgeGroup=allEdges.find(group=>group[0]?.source===focus.id&&group[0]?.target===nodeId);
      if(edgeGroup) label=edgeLabel(edgeGroup);
    }else if(placement?.side==='secondary'){
      const edgeGroup=allEdges.find(group=>{
        const first=group[0];
        const sourcePlacement=placements.get(first.source);
        const targetPlacement=placements.get(first.target);
        return (first.target===nodeId&&sourcePlacement?.side==='outgoing')
          || (first.source===nodeId&&targetPlacement?.side==='outgoing');
      });
      if(edgeGroup) label=edgeLabel(edgeGroup);
    }
    nodePctLabelCache.set(nodeId,label);
    return label;
  };

  const renderListNode=(node,placement)=>{
    const clickable=node.symbol&&hasRelationships(node.symbol)&&placement.side!=='focus';
    const clickAttr=clickable?` onclick="openRelationships(event,'${escapeHtml(node.symbol)}')"`:'';
    const bulletX=placement.side==='incoming'
      ? placement.anchorX-18
      : placement.side==='focus'
        ? placement.textX-34
        : placement.anchorX;
    const pctLabel=getNodePctLabel(node.id);
    const baseLines=getNodeLines(node.id);
    const lines=pctLabel&&placement.side!=='focus'
      ? baseLines.map((line,i)=>i===baseLines.length-1?`${line} ${pctLabel}`:line)
      : baseLines;
    const labelColor=placement.side==='focus'||clickable?'#9ec5ff':'var(--text)';
    const sub=relKindLabel(node);
    const detail=node.symbol&&node.label&&node.label!==node.symbol?node.label:'';
    const arrow=clickable?' ›':'';
    const blockY=placement.side==='focus'?placement.y-14:placement.y-8;
    const textAnchor=placement.side==='focus'?'middle':placement.side==='incoming'?'end':'start';
    const box=getNodeBox(node.id);
    const hoverAttr=` onmouseenter="showRelTooltip(event,'${escapeHtml(node.symbol||node.label||node.id)}','${escapeHtml(sub)}','${escapeHtml(detail)}')" onmousemove="moveRelTooltip(event)" onmouseleave="hideRelTooltip()"`;
    return `
      <g class="rel-node"${clickAttr}${hoverAttr} style="${clickable?'cursor:pointer':''}">
        <title>${escapeHtml(node.label||node.id)}</title>
        <rect x="${box.left}" y="${box.top}" width="${box.width}" height="${box.height}" fill="transparent" stroke="none"></rect>
        <circle cx="${bulletX}" cy="${placement.side==='focus'?placement.y-6:placement.y-5}" r="${placement.side==='focus'?5:3.5}" fill="${placement.side==='focus'?'#6ea8ff':'rgba(255,255,255,.45)'}"></circle>
        ${buildRelTextBlock(lines.map((line,i)=>i===lines.length-1?line+arrow:line),placement.textX,blockY,placement.side==='focus'?28:13,labelColor,placement.side==='focus'?'700':'600',textAnchor)}
      </g>`;
  };

  const renderEdge=(group)=>{
    const first=group[0];
    let sourceId=first.source, targetId=first.target;
    let s=placements.get(sourceId), t=placements.get(targetId);
    if(s?.side==='secondary'&&t?.side==='outgoing'){
      [sourceId,targetId]=[targetId,sourceId];
      [s,t]=[t,s];
    }
    if(!s||!t) return '';
    const sBox=getNodeBox(sourceId);
    const tBox=getNodeBox(targetId);
    const from=getNodeConnector(sourceId,'source');
    const to=getNodeConnector(targetId,'target');
    if(!from||!to) return '';
    const fromX=from.x;
    const fromY=from.y;
    const toX=to.x;
    const toY=to.y;
    const dashed=group.some(e=>e.directness==='effective');
    const stroke=dashed?'rgba(110,168,255,.54)':'rgba(255,255,255,.16)';
    let path='';

    if(s.side==='incoming'&&t.side==='focus'){
      const mergeX=498;
      const c1x=fromX+(mergeX-fromX)*0.42;
      const c2x=mergeX+(toX-mergeX)*0.35;
      path=`M ${fromX} ${fromY} C ${c1x} ${fromY}, ${c2x} ${toY}, ${toX} ${toY}`;
    }else if(s.side==='focus'&&t.side==='outgoing'){
      const railX=726;
      const c1x=fromX+(railX-fromX)*0.55;
      const c2x=railX+(toX-railX)*0.28;
      path=`M ${fromX} ${fromY} C ${c1x} ${fromY}, ${c2x} ${toY}, ${toX} ${toY}`;
    }else{
      const dx=toX-fromX;
      const c1x=fromX+dx*0.36;
      const c2x=fromX+dx*0.72;
      path=`M ${fromX} ${fromY} C ${c1x} ${fromY}, ${c2x} ${toY}, ${toX} ${toY}`;
    }
    return `
      <g class="rel-edge">
        <path d="${path}" fill="none" stroke="${stroke}" stroke-width="${dashed?1.6:1.15}" stroke-dasharray="${dashed?'6 4':'0'}"></path>
      </g>`;
  };

  const laneLabels=currentRel.laneLabels||REL_DEFAULT_LANES;
  const laneBackdrop=`
    <g opacity=".8">
      <text x="86" y="36" fill="var(--text3)" font-size="12">${escapeHtml(laneLabels.incoming||REL_DEFAULT_LANES.incoming)}</text>
      <text x="610" y="36" text-anchor="middle" fill="var(--text3)" font-size="12">${escapeHtml(laneLabels.focus||REL_DEFAULT_LANES.focus)}</text>
      <text x="846" y="36" fill="var(--text3)" font-size="12">${escapeHtml(laneLabels.outgoing||REL_DEFAULT_LANES.outgoing)}</text>
      <text x="1136" y="36" fill="var(--text3)" font-size="12">${escapeHtml(laneLabels.secondary||REL_DEFAULT_LANES.secondary)}</text>
      <path d="M 70 52 H 360" stroke="rgba(255,255,255,.06)" stroke-dasharray="4 5"></path>
      <path d="M 462 52 H 758" stroke="rgba(110,168,255,.08)" stroke-dasharray="4 5"></path>
      <path d="M 830 52 H 1018" stroke="rgba(26,158,110,.08)" stroke-dasharray="4 5"></path>
      <path d="M 1098 52 H 1286" stroke="rgba(255,255,255,.06)" stroke-dasharray="4 5"></path>
    </g>`;
  const visibleEdges=allEdges.filter(group=>{
    const first=group[0];
    const s=placements.get(first.source);
    const t=placements.get(first.target);
    if(!s||!t) return false;
    if(s.side==='incoming'&&t.side==='focus') return true;
    if(s.side==='focus'&&t.side==='outgoing') return true;
    if(s.side==='outgoing'&&t.side==='secondary') return true;
    if(s.side==='secondary'&&t.side==='outgoing') return true;
    return false;
  });
  const edgeSvg=visibleEdges.map(renderEdge).join('');
  const nodes=[focus,...incomingNodes,...outgoingNodes,...sortedSecondaryNodes].map(n=>renderListNode(n,placements.get(n.id))).join('');
  svg.innerHTML=`<g id="relViewport">${laneBackdrop}${edgeSvg}${nodes}</g>`;
  applyRelationshipTransform();
  relView.style.display='flex';
}

      relMode=true;
      resetRelationshipView(false);
      document.getElementById('relView').style.display='flex';
      document.getElementById('cv').style.display='none';
      document.querySelector('.sb2').style.display='none';
      document.getElementById('leg').style.display='none';
      document.getElementById('tt').style.display='none';
      updateModeButtons();
      updateTfNote();
      const target=symbol&&hasRelationships(symbol)?symbol:null;
      if(!target){
        sel=null;
        currentRelSymbol=null;
        currentRel=null;
        updateTfNote();
        document.querySelectorAll('.si').forEach(el=>el.classList.remove('sel'));
        showRelationshipPlaceholder();
        return;
      }
      currentRelSymbol=target;
      currentRel=getRelationshipGraph(target);
      if(!currentRel){
        currentRelSymbol=null;
        showRelationshipPlaceholder(target);
        return;
      }
      renderRelationships();
    }catch(err){
      alert(err.message);
    }
    return;
  }
  relMode=false;
  currentRel=null;
  relPan=null;
  hideRelTooltip();
  document.getElementById('relView').style.display='none';
  document.getElementById('cv').style.display='block';
  document.querySelector('.sb2').style.display='flex';
  document.getElementById('leg').style.display='flex';
  updateModeButtons();
  updateTfNote();
  setCanvasCursor();
  draw();
}
function closeRelationships(){
  setPanelMode('price');
}
function attachCanvasInteractions(){
  if(!cv||cv.dataset.bound==='2') return;
  cv.dataset.bound='2';
  cv.addEventListener('mousemove',onMM);
  cv.addEventListener('click',onClick);
  cv.addEventListener('mouseleave',()=>{if(!chartPan){hov=null;document.getElementById('tt').style.display='none';setCanvasCursor();draw()}});
  cv.addEventListener('wheel',onWheel,{passive:false});
  cv.addEventListener('dblclick',()=>resetChartZoom());
  cv.addEventListener('mousedown',onCanvasDown);
  window.addEventListener('mousemove',onCanvasDrag);
  window.addEventListener('mouseup',endCanvasPan);
}
function onCanvasDown(e){
  if(relMode||!results.length||e.button!==0||!chartZoom) return;
  const vis=getVisibleResults();
  const current=getCurrentExtents(vis);
  if(!current) return;
  chartPan={startX:e.clientX,startY:e.clientY,startExtents:{...current},moved:false};
  hov=null;
  document.getElementById('tt').style.display='none';
  setCanvasCursor();
}
function onCanvasDrag(e){
  if(!chartPan||relMode||!results.length) return;
  const W=cv.width,H=cv.height,P={l:54,r:22,t:22,b:42};
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  const vis=getVisibleResults();
  const base=getBaseExtents(vis);
  if(!base) return;
  const dx=e.clientX-chartPan.startX;
  const dy=e.clientY-chartPan.startY;
  if(!chartPan.moved&&Math.hypot(dx,dy)>4) chartPan.moved=true;
  const spanX=chartPan.startExtents.r1-chartPan.startExtents.r0;
  const spanY=chartPan.startExtents.m1-chartPan.startExtents.m0;
  const next=clampExtents({
    r0:chartPan.startExtents.r0-(dx/pw)*spanX,
    r1:chartPan.startExtents.r1-(dx/pw)*spanX,
    m0:chartPan.startExtents.m0+(dy/ph)*spanY,
    m1:chartPan.startExtents.m1+(dy/ph)*spanY
  },base);
  const isBase=Math.abs(next.r0-base.r0)<0.001&&Math.abs(next.r1-base.r1)<0.001&&Math.abs(next.m0-base.m0)<0.001&&Math.abs(next.m1-base.m1)<0.001;
  chartZoom=isBase?null:next;
  setCanvasCursor();
  draw();
}
function endCanvasPan(){
  if(!chartPan) return;
  if(chartPan.moved) chartSuppressClickUntil=Date.now()+220;
  chartPan=null;
  setCanvasCursor();
}
function onMM(e){
  if(relMode) return;
  if(chartPan){onCanvasDrag(e);return}
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(cv.width/rect.width);
  const my=(e.clientY-rect.top)*(cv.height/rect.height);
  const W=cv.width,H=cv.height,P={l:54,r:22,t:22,b:42};
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  const vis=getVisibleResults();
  const ext=getCurrentExtents(vis);
  if(!ext) return;
  const {r0,r1,m0,m1}=ext;
  const tx=v=>P.l+(v-r0)/(r1-r0)*pw,ty=v=>P.t+ph-(v-m0)/(m1-m0)*ph;
  const disp=view==='sector'?bySector(vis):vis;
  const radiusFor=makeRadiusScaler(disp);
  let found=null;
  for(const s of disp){
    const L=s.tail[s.tail.length-1];
    const hitR=radiusFor(s,hov&&hov.name===s.name)+4;
    if(Math.hypot(mx-tx(L.rsRatio),my-ty(L.rsMom))<hitR){found=s;break}
  }
  const tt=document.getElementById('tt');
  if(found){
    hov=found;
    const q=quad(found.last.rsRatio,found.last.rsMom);
    const sizeValue=getSizeMetric(found);
    tt.innerHTML=`<div class="tth"><span style="width:10px;height:10px;border-radius:50%;background:${found.color};display:inline-block;flex-shrink:0"></span>${found.name}</div>
      <div class="ttr"><span class="ttk">RS-Ratio</span><span class="ttv">${found.last.rsRatio.toFixed(2)}</span></div>
      <div class="ttr"><span class="ttk">RS-Momentum</span><span class="ttv">${found.last.rsMom.toFixed(2)}</span></div>
      <div class="ttr"><span class="ttk">Quadrant</span><span class="ttv" style="color:${QC[q]}">${q}</span></div>
      <div class="ttr"><span class="ttk">Sector</span><span class="ttv">${found.sector}</span></div>
      <div class="ttr"><span class="ttk">${SIZE_META[sizeMode].label}</span><span class="ttv">${formatSizeValue(sizeValue)}</span></div>`;
    tt.style.display='block';
    tt.style.left=(e.clientX+14)+'px';
    tt.style.top=(e.clientY-20)+'px';
  }else{
    hov=null;
    tt.style.display='none';
  }
  setCanvasCursor();
  draw();
}
function onWheel(e){
  if(relMode||!results.length) return;
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(cv.width/rect.width);
  const my=(e.clientY-rect.top)*(cv.height/rect.height);
  const W=cv.width,H=cv.height,P={l:54,r:22,t:22,b:42};
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  const vis=getVisibleResults();
  const base=getBaseExtents(vis);
  const current=getCurrentExtents(vis);
  if(!base||!current) return;
  const dataX=current.r0+((mx-P.l)/pw)*(current.r1-current.r0);
  const dataY=current.m1-((my-P.t)/ph)*(current.m1-current.m0);
  const factor=e.deltaY<0?0.88:1.12;
  const next=clampExtents({
    r0:dataX-(dataX-current.r0)*factor,
    r1:dataX+(current.r1-dataX)*factor,
    m0:dataY-(dataY-current.m0)*factor,
    m1:dataY+(current.m1-dataY)*factor
  },base);
  const isBase=Math.abs(next.r0-base.r0)<0.001&&Math.abs(next.r1-base.r1)<0.001&&Math.abs(next.m0-base.m0)<0.001&&Math.abs(next.m1-base.m1)<0.001;
  chartZoom=isBase?null:next;
  setCanvasCursor();
  draw();
}
async function onClick(){
  if(Date.now()<chartSuppressClickUntil||!hov) return;
  const clicked=hov.name;
  sel=sel===clicked?null:clicked;
  currentRelSymbol=sel&&hasRelationships(sel)?sel:null;
  updateTfNote();
  draw();
  document.querySelectorAll('.si').forEach(el=>{el.classList.remove('sel');if(sel&&el.dataset.n===sel)el.classList.add('sel')});
}

window.addEventListener('resize',handleResize);
document.addEventListener('keydown',event=>{if(event.key==='Escape')toggleImpactPanel(false)});
document.addEventListener('click',event=>{
  const pop=document.getElementById('impactPop');
  if(pop.classList.contains('open')&&!pop.contains(event.target)&&!document.getElementById('impactBtn').contains(event.target)) toggleImpactPanel(false);
});
buildImpactList();
updateModeButtons();
updateTfNote();
checkServer();
ensureRelationshipsLoaded().then(()=>{if(results.length)buildSb()}).catch(()=>{});
</script>
